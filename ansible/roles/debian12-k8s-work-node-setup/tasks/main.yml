---
# tasks file for debian12-k8s-work-node-setup

- name: —Б—В–∞–≤–Є–Љ –љ—Г–ґ–љ—Л–µ –њ–∞–Ї–µ—В—Л
  apt:
    name: 
      -  curl 
      -  apt-transport-https
      -  ca-certificates 
      -  gnupg
    update_cache: yes 

- name: —Б–Њ–Ј–і–∞–µ–Љ –і–Є—А–µ–Ї—В–Њ—А—Г—О –і–ї—П –Ї–ї—О—З–µ–є
  ansible.builtin.file:
    path: /etc/apt/keyrings 
    state: directory
    recurse: yes    
 
- name: –і–Њ–±–∞–≤—П–ї–µ–Љ –Ї–ї—О—З
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc

- name: –Љ–µ–љ—П–µ–Љ –њ–µ—А–Љ–Є—И–µ–љ—Л 
  file: dest=/etc/apt/keyrings/docker.asc mode=a+r

- name: –і–Њ–±–∞–≤–Є–Љ —А–µ–њ—Г
  shell: 
    cmd: echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian  $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

- name: —Б—В–∞–≤–Є–Љ containerd
  apt:
    name: 
      -  containerd.io
    update_cache: yes 

- name: —Б–Њ–Ј–і–∞–і–Є–Љ –і–Є—А–µ–Ї—В–Њ—А—Г—О –і–ї—П containerd
  ansible.builtin.file:
    path: /etc/containerd 
    state: directory
    recurse: yes

- name: —Б–Њ–Ј–і–∞–і–Є–Љ –Ї–Њ–љ—Д–Є–≥
  shell: 
    cmd: containerd config default | tee /etc/containerd/config.toml

- name: –≤–Ї–ї—О—З–Є SystemdCgroup in config  
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: –њ–µ—А–µ–Ј–∞–њ—Г—Б—В–Є–Љ containerd
  systemd:
      name: containerd
      state: restarted

- name: —Б–Њ–Ј–і–∞–і–Є–Љ –і–Є—А–µ–Ї—В–Њ—А—Г—О –і–ї—П gpg –Ї–ї—О—З–∞ k8s
  shell:  curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: "/etc/apt/keyrings/kubernetes-apt-keyring.gpg"

- name: –і–Њ–±–∞–≤–Є–Љ —А–µ–њ—Г –і–ї—П k8s 
  shell: 
    cmd: echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /' |  tee /etc/apt/sources.list.d/kubernetes.list

- name: –Љ–µ–љ—П–µ–Љ –њ–µ—А–Љ–Є—И–µ–љ—Л –і–ї—П kubernetes.list
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/kubernetes.list
    mode: '0644'

- name: —Б—В–∞–≤–Є–Љ –њ–∞–Ї–µ—В—Л –і–ї—П k8s 
  apt:
    name: 
      -  kubeadm
#      -  kube-proxy 
      -  kubelet 
      -  kubectl 
      -  kubernetes-cni
      -  ethtool
      -  conntrack
    update_cache: yes  

- name: –≤—Л–Ї–ї—О—З–Є–Љ —Б–≤–Њ–њ
  shell: 
    cmd: swapoff -a

- name: –≤—Л–Ї–ї—О—З–Є–Љ —Б–≤–Њ–њ –≤ /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^(\s*)([^#\n]+\s+)(\w+\s+)swap(\s+.*)$'
    replace: '#\1\2\3swap\4'     

- name: –і–Њ–±–∞–≤–Є–Љ br_netfilter module
  community.general.modprobe:
    name: br_netfilter
    state: present    

- name: –≤–Ї–ї—О—З–Є–Љ —Д–Њ—А–≤–∞—А–і–Є–љ–≥
  replace:
    path: /etc/sysctl.conf
    regexp: '#net.ipv4.ip_forward=1'
    replace: 'net.ipv4.ip_forward=1'    

- name: –≤–Ї–ї—О—З–Є–Љ —Д–Њ—А–≤–∞—А–і–Є–љ–≥ –њ—А—П–Љ–Њ —Б–µ–є—З–∞—Б
  shell: 
    cmd: sysctl -w net.ipv4.ip_forward=1

